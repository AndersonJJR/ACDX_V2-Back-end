### INFO BANCO DE DADOS

spring.datasource.url=jdbc:mysql://${DB_HOST}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

### INFO EMAIL SMTP FAKE

spring.mail.host=smtp.ethereal.email
spring.mail.port=${ETHEREAL_PORT}
spring.mail.username=${ETHEREAL_EMAIL}
spring.mail.password=${ETHEREAL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

### JWT TOKEN

jwt.expiration.time=${TOKEN_EXPIRATION}
jwt.public.key=${PATH_PUB_KEY}
jwt.private.key=${PATH_PRIVATE_KEY}

### ARQUIVOS

spring.servlet.multipart.max-file-size=168KB
spring.servlet.multipart.max-request-size=168KB